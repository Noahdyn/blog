name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'blog/**'
      - 'assets/**'
      - 'style.css'
      - 'index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build SSG
        run: make clean && make

      - name: Run SSG
        run: ./ssg

      - name: Commit and push generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate site"
          git push
